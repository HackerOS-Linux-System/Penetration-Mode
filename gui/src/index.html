<!DOCTYPE html>
<html>
<head>
  <title>Penetration Mode</title>
  <meta charset="UTF-8" />
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3.7.2/dist/vuetify.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <v-app theme="dark">
      <v-navigation-drawer>
        <v-list>
          <v-list-item v-for="profile in profiles" :key="profile.name" @click="selectProfile(profile)">
            <v-icon :icon="profile.icon"></v-icon>
            {{ profile.name }}
          </v-list-item>
        </v-list>
      </v-navigation-drawer>
      <v-main>
        <v-container>
          <v-row>
            <v-col>
              <h1>Penetration Mode</h1>
              <v-btn color="primary" @click="startSession" icon="mdi-plus">New Session</v-btn>
            </v-col>
          </v-row>
          <v-row>
            <v-col cols="8">
              <v-card>
                <v-card-title>Console</v-card-title>
                <div id="terminal" style="height: 400px;"></div>
                <v-text-field v-model="command" label="Command" @keyup.enter="runCommand"></v-text-field>
                <v-btn color="success" @click="runCommand" icon="mdi-play">Run</v-btn>
                <v-btn color="error" @click="clearOutput" icon="mdi-delete">Clear</v-btn>
              </v-card>
            </v-col>
            <v-col cols="4">
              <v-card>
                <v-card-title>Results</v-card-title>
                <v-tabs v-model="activeTab">
                  <v-tab value="table">Table</v-tab>
                  <v-tab value="chart">Chart</v-tab>
                </v-tabs>
                <v-window v-model="activeTab">
                  <v-window-item value="table">
                    <v-table>
                      <tbody>
                        <tr v-for="item in results" :key="item.ip">
                          <td>{{ item.ip }}</td>
                          <td>{{ item.ports }}</td>
                        </tr>
                      </tbody>
                    </v-table>
                  </v-window-item>
                  <v-window-item value="chart">
                    <canvas id="resultsChart"></canvas>
                  </v-window-item>
                </v-window>
                <v-btn color="info" @click="exportToPDF" icon="mdi-file-pdf">Export PDF</v-btn>
              </v-card>
            </v-col>
          </v-row>
        </v-container>
      </v-main>
    </v-app>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3.7.2/dist/vuetify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
